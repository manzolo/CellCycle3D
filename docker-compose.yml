services:
  # Production-like build served by nginx
  app:
    build:
      context: .
      args:
        VITE_BASE: ${VITE_BASE:-/}
    image: cellcycle3d:latest
    container_name: cellcycle3d
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

  # Hot-reloading dev server (run with: make dev)
  dev:
    image: node:22-alpine
    container_name: cellcycle3d-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${DEV_PORT:-5173}:5173"
    profiles:
      - dev
